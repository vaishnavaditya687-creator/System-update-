<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Candy Crush Clone</title>
    <style>
        body { background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: white; font-family: sans-serif; }
        .grid { width: 320px; height: 320px; display: flex; flex-wrap: wrap; background-color: rgba(255,255,255,0.1); border: 5px solid #444; border-radius: 10px; }
        .grid div { width: 40px; height: 40px; }
        /* Candies Colors */
        .red { background-color: #ff4d4d; border-radius: 50%; border: 2px solid #222; box-sizing: border-box; }
        .blue { background-color: #4d94ff; border-radius: 50%; border: 2px solid #222; box-sizing: border-box; }
        .green { background-color: #5cd65c; border-radius: 50%; border: 2px solid #222; box-sizing: border-box; }
        .yellow { background-color: #ffff66; border-radius: 50%; border: 2px solid #222; box-sizing: border-box; }
        .purple { background-color: #b366ff; border-radius: 50%; border: 2px solid #222; box-sizing: border-box; }
    </style>
</head>
<body>

    <div>
        <h2 style="text-align: center;">Score: <span id="score">0</span></h2>
        <div class="grid"></div>
    </div>

    <script>
        const grid = document.querySelector('.grid')
        const scoreDisplay = document.getElementById('score')
        const width = 8
        const squares = []
        const candyColors = ['red', 'blue', 'green', 'yellow', 'purple']

        // Create Board
        function createBoard() {
            for (let i = 0; i < width * width; i++) {
                const square = document.createElement('div')
                let randomColor = Math.floor(Math.random() * candyColors.length)
                square.classList.add(candyColors[randomColor])
                square.setAttribute('draggable', true)
                square.setAttribute('id', i)
                grid.appendChild(square)
                squares.push(square)
            }
        }
        createBoard()
    </script>
</body>
</html>
